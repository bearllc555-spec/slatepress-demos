<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slatepress Demos</title>
  <meta name="description" content="Personalized AI-generated demo websites for local plumbers in Metro NYC. Slatepress.">
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .card { max-width: 580px; padding: 3rem 2.5rem; text-align: center; }
    h1 { font-size: clamp(2rem, 5vw, 2.6rem); margin: 0 0 1rem; color: #fff; letter-spacing: -0.02em; font-weight: 800; }
    p { font-size: 1.1rem; line-height: 1.65; opacity: 0.88; margin: 0.6rem 0; }
    a { color: #60a5fa; text-decoration: none; border-bottom: 1px dotted #475569; }
    a:hover { color: #93c5fd; border-color: #60a5fa; }
    .stamp { margin-top: 2.5rem; font-size: 0.82rem; opacity: 0.5; font-family: ui-monospace, monospace; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Slatepress Demos</h1>
    <p>Personalized AI-generated websites for local plumbers in Metro NYC.</p>
    <p>Visit <a href="https://slatepress.co">slatepress.co</a> for the studio.</p>
    <p class="stamp">demos.slatepress.co</p>
  </div>
</body>
</html>
